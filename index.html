<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cricket Insights Hub</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #07111f 0%, #0f2742 50%, #132f54 100%);
      color: #ffffff;
    }
    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }
    p {
      color: #d7e5f7;
      font-size: 18px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 22px;
      background: #25D366;
      color: #000;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }
    .features {
      margin-top: 30px;
    }
    .features div {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="container">
      <div class="card">
        <h1>Join Cricket Insights Community</h1>
        <p>
          Stay updated with live cricket matches, simple insights, and a smooth community experience. 
          Get quick updates and connect easily through WhatsApp.
        </p>

        <a class="btn" href="https://wa.me/447599229373?text=Hi%2C%20I%20want%20to%20join" target="_blank">
          Join on WhatsApp
        </a>

        <div class="features">
          <div>✔ Live Match Updates</div>
          <div>✔ Easy Join Process</div>
          <div>✔ Quick Support</div>
        </div>

      </div>
    </div>
  </section>
</body>
</html>
